<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PolyPay - Private Multisig Wallet</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 2rem; max-width: 900px; margin: 0 auto; }
      h1 { margin-bottom: 0.5rem; color: #8b5cf6; }
      h2 { margin: 1rem 0 0.5rem; color: #a78bfa; font-size: 1.1rem; }
      p { color: #aaa; margin-bottom: 0.5rem; }
      .card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin: 0.75rem 0; }
      button { background: #8b5cf6; color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; margin: 0.25rem; font-size: 0.9rem; }
      button:hover { background: #7c3aed; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary { background: #2a2a3e; border: 1px solid #444; }
      button.secondary:hover { background: #3a3a4e; }
      button.danger { background: #dc2626; }
      button.danger:hover { background: #b91c1c; }
      button.success { background: #16a34a; }
      button.success:hover { background: #15803d; }
      input, select { background: #2a2a3e; border: 1px solid #444; color: white; padding: 0.5rem; border-radius: 4px; width: 100%; margin: 0.25rem 0; font-size: 0.9rem; }
      label { display: block; color: #aaa; font-size: 0.85rem; margin-top: 0.5rem; }
      .status { padding: 0.5rem; margin: 0.5rem 0; border-radius: 4px; font-size: 0.9rem; }
      .status.connected { background: #1a3a1a; border: 1px solid #2d5a2d; }
      .status.error { background: #3a1a1a; border: 1px solid #5a2d2d; }
      .status.info { background: #1a2a3a; border: 1px solid #2d4a5a; }
      .spinner-row { display: flex; align-items: center; gap: 0.75rem; }
      .spinner { width: 20px; height: 20px; border: 3px solid #333; border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .tabs { display: flex; gap: 0.25rem; margin: 1rem 0 0.5rem; flex-wrap: wrap; }
      .tab { background: #2a2a3e; padding: 0.4rem 1rem; border-radius: 4px 4px 0 0; cursor: pointer; border: 1px solid #444; border-bottom: none; font-size: 0.85rem; }
      .tab.active { background: #8b5cf6; border-color: #8b5cf6; }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .stat { text-align: center; padding: 0.75rem; background: #2a2a3e; border-radius: 4px; }
      .stat .value { font-size: 1.5rem; font-weight: bold; color: #8b5cf6; }
      .stat .label { font-size: 0.75rem; color: #888; }
      .tx-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid #333; font-size: 0.85rem; }
      .tx-row:last-child { border-bottom: none; }
      .batch-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 0.5rem; align-items: center; margin: 0.25rem 0; }
      pre { white-space: pre-wrap; margin: 0; font-size: 0.85rem; }
      .mono { font-family: monospace; font-size: 0.8rem; word-break: break-all; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
