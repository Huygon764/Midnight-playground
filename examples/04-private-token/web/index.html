<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Token - Midnight</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 2rem; }
      h1 { margin-bottom: 1rem; color: #8b5cf6; }
      h2 { margin: 1.5rem 0 0.5rem; color: #a78bfa; }
      .card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin: 1rem 0; }
      button { background: #8b5cf6; color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; margin: 0.25rem; }
      button:hover { background: #7c3aed; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input { background: #2a2a3e; border: 1px solid #444; color: white; padding: 0.5rem; border-radius: 4px; width: 100%; margin: 0.25rem 0; }
      .status { padding: 0.5rem; margin: 0.5rem 0; border-radius: 4px; }
      .status.connected { background: #1a3a1a; border: 1px solid #2d5a2d; }
      .status.error { background: #3a1a1a; border: 1px solid #5a2d2d; }
      .status.info { background: #1a2a3a; border: 1px solid #2d4a5a; }
      .supply-box { text-align: center; padding: 1.5rem; border-radius: 8px; background: #1a2a3a; border: 1px solid #2d4a5a; margin: 1rem 0; }
      .supply-box .count { font-size: 2rem; font-weight: bold; color: #8b5cf6; }
      .tabs { display: flex; gap: 0.5rem; margin: 1rem 0; }
      .tab { background: #2a2a3e; border: 1px solid #444; padding: 0.5rem 1rem; border-radius: 4px 4px 0 0; cursor: pointer; color: #e0e0e0; }
      .tab.active { background: #8b5cf6; border-color: #8b5cf6; color: white; }
      label { display: block; margin: 0.5rem 0 0.25rem; color: #a0a0a0; font-size: 0.9rem; }
      .spinner-row { display: flex; align-items: center; gap: 0.75rem; }
      .spinner { width: 20px; height: 20px; border: 3px solid #333; border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
