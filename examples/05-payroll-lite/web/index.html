<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payroll Lite - Midnight</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 2rem; }
      h1 { margin-bottom: 1rem; color: #8b5cf6; }
      h2 { margin: 1.5rem 0 0.5rem; color: #a78bfa; }
      .card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin: 1rem 0; }
      button { background: #8b5cf6; color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; margin: 0.25rem; }
      button:hover { background: #7c3aed; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input { background: #2a2a3e; border: 1px solid #444; color: white; padding: 0.5rem; border-radius: 4px; width: 100%; margin: 0.25rem 0; }
      .status { padding: 0.5rem; margin: 0.5rem 0; border-radius: 4px; }
      .status.connected { background: #1a3a1a; border: 1px solid #2d5a2d; }
      .status.error { background: #3a1a1a; border: 1px solid #5a2d2d; }
      .status.info { background: #1a2a3a; border: 1px solid #2d4a5a; }
      .role-selector { display: flex; gap: 1rem; margin: 1rem 0; }
      .role-selector button { flex: 1; padding: 1rem; font-size: 1.1rem; }
      .role-selector button.active { background: #7c3aed; outline: 2px solid #a78bfa; }
      label { display: block; margin: 0.5rem 0 0.25rem; color: #aaa; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
